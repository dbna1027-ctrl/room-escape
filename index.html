<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방과 후 교실 — 방탈출 (난이도 ↑↑↑↑)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    --font-mono: "SF Mono", "Menlo", Consolas, monospace;
    --font-serif: "Times New Roman", "Nanum Myeongjo", serif;
    --color-text-primary: #1A1A19;
    --color-text-secondary: #5F5E5A;
    --color-text-tertiary: #888780;
    --color-text-info: #185FA5;
    --color-text-danger: #A32D2D;
    --color-text-success: #0F6E56;
    --color-background-page: #F5F4EF;
    --color-background-primary: #FFFFFF;
    --color-background-secondary: #F1EFE8;
    --color-background-tertiary: #E5E2D8;
    --color-background-info: #E6F1FB;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-info: #378ADD;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #ECEBE6;
      --color-text-secondary: #B4B2A9;
      --color-text-tertiary: #888780;
      --color-text-info: #85B7EB;
      --color-text-danger: #F09595;
      --color-text-success: #5DCAA5;
      --color-background-page: #1C1B18;
      --color-background-primary: #2A2A27;
      --color-background-secondary: #222220;
      --color-background-tertiary: #34332F;
      --color-background-info: #0C447C;
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-border-secondary: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-page); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
  .wrap { width: 100%; max-width: 720px; }
  button { font-family: inherit; font-size: 13px; padding: 8px 14px; background: transparent; color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; transition: background 0.15s, transform 0.05s; }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.98); }

  .escape-game { padding: 1rem 0; }
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
  .game-title { font-size: 18px; font-weight: 500; }
  .game-sub { font-size: 13px; color: var(--color-text-secondary); margin-left: 8px; }
  .room { position: relative; width: 100%; aspect-ratio: 17 / 9; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); background: #D9C9B0; }
  .room svg { display: block; width: 100%; height: 100%; transition: filter 0.5s ease; }
  .room.lamp-off svg { filter: brightness(0.45) saturate(0.55) hue-rotate(-8deg); }
  .hotspot { cursor: pointer; transition: filter 0.15s; }
  .hotspot:hover { filter: brightness(1.15); }
  .message-log { margin-top: 12px; padding: 14px 16px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); min-height: 58px; font-size: 14px; line-height: 1.6; }
  .inventory { margin-top: 12px; padding: 12px 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
  .inventory-title { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .inventory-items { display: flex; gap: 8px; flex-wrap: wrap; min-height: 32px; align-items: center; }
  .inv-item { padding: 6px 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .inv-item:hover { background: var(--color-background-tertiary); }
  .inv-empty { color: var(--color-text-tertiary); font-size: 13px; }
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 10; padding: 16px; overflow-y: auto; }
  .modal { background: var(--color-background-primary); padding: 20px 22px; border-radius: var(--border-radius-lg); max-width: 400px; width: 100%; border: 0.5px solid var(--color-border-tertiary); max-height: calc(100% - 8px); overflow-y: auto; }
  .modal h3 { margin: 0 0 4px; font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .modal .modal-state { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--color-background-secondary); }
  .modal .modal-state.dark { background: #1A1A19; color: #D4B43A; }
  .modal p { margin: 6px 0; font-size: 14px; line-height: 1.55; }
  .note-paper { margin: 12px 0; padding: 16px 18px; background: #F5EAC8; color: #3A2818; border: 0.5px solid #B89860; border-radius: var(--border-radius-md); font-family: var(--font-serif); font-size: 14px; line-height: 1.85; box-shadow: inset 0 0 12px rgba(120,80,30,0.08); }
  .note-paper .note-title { font-size: 13px; letter-spacing: 1px; text-align: center; border-bottom: 0.5px solid #B89860; padding-bottom: 8px; margin-bottom: 10px; font-style: normal; }
  .note-paper .note-order { font-family: var(--font-mono); font-size: 16px; letter-spacing: 2px; text-align: center; margin: 12px 0; color: #5A3010; font-weight: 500; }
  .note-paper .note-verse { font-style: italic; text-align: center; margin: 4px 0; }
  .note-paper .note-foot { font-size: 11px; color: #6A5535; margin-top: 14px; text-align: center; letter-spacing: 0.5px; }
  .timetable { margin: 14px 0; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
  .timetable-row { display: grid; grid-template-columns: 16px 50px 1fr; gap: 10px; align-items: center; padding: 8px 12px; font-size: 13px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .timetable-row:last-child { border-bottom: none; }
  .timetable-swatch { width: 14px; height: 14px; border-radius: 3px; border: 0.5px solid rgba(0,0,0,0.2); }
  .timetable-period { font-weight: 500; color: var(--color-text-secondary); font-size: 12px; }
  .timetable-subject { color: var(--color-text-primary); }
  .lockers-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
  .locker-card { padding: 10px 6px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); text-align: center; background: var(--color-background-secondary); position: relative; }
  .locker-letter { position: absolute; top: 6px; right: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; }
  .locker-door { width: 26px; height: 38px; margin: 0 auto 5px; border-radius: 2px; border: 0.5px solid rgba(0,0,0,0.3); position: relative; }
  .locker-door::after { content: ''; position: absolute; right: 2px; top: 22px; width: 2px; height: 6px; background: rgba(0,0,0,0.4); border-radius: 1px; }
  .locker-label { font-size: 11px; color: var(--color-text-secondary); }
  .locker-num { font-size: 17px; font-weight: 500; color: var(--color-text-primary); margin-top: 2px; font-family: var(--font-mono); letter-spacing: 1px; }
  .code-row { display: flex; gap: 8px; justify-content: center; margin: 14px 0 6px; }
  .code-digit { width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); font-family: inherit; }
  .code-digit:focus { outline: none; box-shadow: 0 0 0 2px var(--color-border-info); }
  .code-msg { font-size: 13px; text-align: center; min-height: 18px; color: var(--color-text-danger); margin-top: 4px; line-height: 1.4; }
  .modal-actions { display: flex; gap: 8px; margin-top: 10px; }
  .modal-actions button { flex: 1; }
  .modal-actions button.primary { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .win-title { font-size: 20px; font-weight: 500; color: var(--color-text-success); text-align: center; margin-bottom: 8px; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>
<body>
<div class="wrap">
<h2 class="sr-only">한국어 방탈출 게임. 방과 후 교실에서 사물함, 책상, 가방, 화분, 액자, 벽시계, 시간표, 스탠드를 조사해 단서를 모으고, 4자리 비밀번호를 풀고 교실 문을 열어 탈출하세요.</h2>

    <button id="restartBtn">처음부터</button>

        <ellipse cx="475" cy="305" rx="22" ry="4" fill="#4A3220" opacity="0.5"/>
        <path d="M 455 270 L 495 270 L 491 302 L 459 302 Z" fill="#A85A4A" stroke="#6A3525" stroke-width="1.2"/>
        <ellipse cx="475" cy="270" rx="20" ry="3" fill="#5A3020"/>
        <ellipse cx="468" cy="245" rx="9" ry="14" fill="#4A7A3E" transform="rotate(-25 468 245)" opacity="0.5"/>
        <ellipse cx="482" cy="247" rx="9" ry="14" fill="#5A8A4E" transform="rotate(20 482 247)" opacity="0.5"/>
        <ellipse cx="475" cy="240" rx="10" ry="12" fill="#3E6A35" opacity="0.5"/>
      </g>

      <!-- student backpack on floor (replaces rug) -->
      <g id="backpackGroup" class="hotspot" onclick="onBackpackClick()">
        <ellipse cx="305" cy="345" rx="44" ry="4" fill="#3A2818" opacity="0.45"/>
        <path d="M 270 298 Q 270 292 280 292 L 330 292 Q 340 292 340 298 L 343 340 Q 343 348 333 348 L 277 348 Q 267 348 267 340 Z" fill="#3B5BA8" stroke="#1F3F70" stroke-width="1"/>
        <path d="M 277 318 L 333 318 L 336 340 Q 336 343 333 343 L 277 343 Q 274 343 274 340 Z" fill="#2F4878" stroke="#1F3F70" stroke-width="0.8"/>
        <rect x="300" y="327" width="10" height="3" fill="#D4843A"/>
        <path d="M 290 292 Q 290 282 300 282 L 310 282 Q 320 282 320 292" fill="none" stroke="#1F3F70" stroke-width="3"/>
        <circle cx="285" cy="306" r="1.5" fill="#1F3F70"/>
        <circle cx="325" cy="306" r="1.5" fill="#1F3F70"/>
      </g>
      <g id="backpackOpenGroup" style="display:none;">
        <ellipse cx="305" cy="345" rx="44" ry="4" fill="#3A2818" opacity="0.45"/>
        <path d="M 270 305 Q 270 295 280 295 L 330 295 Q 340 295 340 305 L 343 340 Q 343 348 333 348 L 277 348 Q 267 348 267 340 Z" fill="#3B5BA8" stroke="#1F3F70" stroke-width="1"/>
        <path d="M 270 305 Q 285 290 305 290 Q 325 290 340 305 L 340 310 L 270 310 Z" fill="#2F4878" stroke="#1F3F70" stroke-width="0.8"/>
        <text x="305" y="335" font-size="6" fill="#E8E4D8" text-anchor="middle" font-style="italic">불 꺼야 진실...</text>
      </g>
    </svg>

    <div class="modal-overlay" id="modalOverlay" style="display:none;">
      <div class="modal" id="modalBox"></div>
    </div>
  </div>

  <div class="message-log" id="messageLog">
    방과 후, 텅 빈 교실에서 깨어났다. 문은 잠겨있다. 사물함, 책상, 시간표, 벽시계… 무언가 단서가 숨어있을 것 같다.
  </div>

  <div class="inventory">
    <div class="inventory-title">소지품</div>
    <div class="inventory-items" id="inventoryItems">
      <span class="inv-empty">아직 가진 것이 없다</span>
    </div>
  </div>
</div>
</div>

<script>
(function(){
  const COLORS_ORDER = ['red','orange','yellow','green','blue','purple'];
  const COLORS = {
    red:    { name: '빨간 사물함', letter: 'R', hex: '#C44545' },
    orange: { name: '주황 사물함', letter: 'O', hex: '#D4843A' },
    yellow: { name: '노란 사물함', letter: 'Y', hex: '#D4B43A' },
    green:  { name: '초록 사물함', letter: 'G', hex: '#4A7A3E' },
    blue:   { name: '파란 사물함', letter: 'B', hex: '#3B6BA8' },
    purple: { name: '보라 사물함', letter: 'P', hex: '#6B4A8B' }
  };
  const SUBJECTS = ['국어','수학','영어','과학','미술','음악'];
  const CODE_ORDER = ['yellow','red','green','blue']; // final code uses these in this order

  function rand3() { return Math.floor(100 + Math.random() * 900); }
  function randDigitPos() { return Math.floor(Math.random() * 3) + 1; }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generatePuzzle() {
    // Random assignment: 6 colors → 6 periods (1..6)
    const shuffled = shuffle(COLORS_ORDER);
    const periodToColor = {};
    const colorToPeriod = {};
    shuffled.forEach((c, i) => {
      periodToColor[i + 1] = c;
      colorToPeriod[c] = i + 1;
    });
    // The memo will list periods in CODE_ORDER (yellow,red,green,blue) sequence
    const codePeriods = CODE_ORDER.map(c => colorToPeriod[c]);

    const lampOn = {}, lampOff = {};
    COLORS_ORDER.forEach(c => {
      lampOff[c] = rand3();
      let on; do { on = rand3(); } while (on === lampOff[c]);
      lampOn[c] = on;
    });
    const dp = randDigitPos();
    const code = CODE_ORDER.map(c => lampOff[c].toString()[dp - 1]).join('');
    return { periodToColor, colorToPeriod, codePeriods, lampOn, lampOff, digitPos: dp, code };
  }

  let puzzle = generatePuzzle();
  let state = {
    inv: [], hasSmallKey: false, plantChecked: false,
    drawerOpened: false, paintingMoved: false, safeOpened: false,
    lampOn: true, backpackChecked: false, wrongAttempts: 0, won: false
  };

  const itemNames = {
    small_key:  { icon: 'ti-key',   name: '작은 열쇠' },
    note:       { icon: 'ti-notes', name: '쪽지' },
    golden_key: { icon: 'ti-key',   name: '교실 열쇠' }
  };

  function noteHTML() {
    const p = puzzle.codePeriods;
    return (
      '<div class="note-paper">' +
        '<div class="note-title">비밀번호 — 네 자리</div>' +
        '<div class="note-verse">시간표를 거슬러,</div>' +
        '<div class="note-order">' + p[0] + '교시 &rarr; ' + p[1] + '교시 &rarr; ' + p[2] + '교시 &rarr; ' + p[3] + '교시</div>' +
        '<div class="note-verse">각 사물함의 세 숫자 중,</div>' +
        '<div class="note-verse">멈춰버린 자가</div>' +
        '<div class="note-verse">그 자리를 알려준다.</div>' +
        '<div class="note-foot">* 빛 아래 보이는 숫자는 거짓이다.</div>' +
      '</div>'
    );
  }

  function log(msg) { document.getElementById('messageLog').textContent = msg; }

  function renderInventory() {
    const div = document.getElementById('inventoryItems');
    if (state.inv.length === 0) {
      div.innerHTML = '<span class="inv-empty">아직 가진 것이 없다</span>';
      return;
    }
    div.innerHTML = state.inv.map(i => {
      const it = itemNames[i];
      return '<span class="inv-item" data-id="'+i+'"><i class="ti '+it.icon+'" aria-hidden="true"></i>'+it.name+'</span>';
    }).join('');
    div.querySelectorAll('.inv-item').forEach(el => {
      el.addEventListener('click', () => onInvClick(el.dataset.id));
    });
  }

  function addItem(item) {
    if (!state.inv.includes(item)) { state.inv.push(item); renderInventory(); }
  }

  function showModal(html) {
    document.getElementById('modalBox').innerHTML = html;
    document.getElementById('modalOverlay').style.display = 'flex';
  }
  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
  window.closeModal = closeModal;

  function updateClockHand(pos) {
    const angleDeg = pos * 30;
    const rad = angleDeg * Math.PI / 180;
    const cx = 475, cy = 110, len = 17;
    const x2 = cx + len * Math.sin(rad);
    const y2 = cy - len * Math.cos(rad);
    const hand = document.getElementById('clockHourHand');
    if (hand) { hand.setAttribute('x2', x2.toFixed(2)); hand.setAttribute('y2', y2.toFixed(2)); }
  }

  window.onBackpackClick = function() {
    if (!state.backpackChecked) {
      state.backpackChecked = true;
      document.getElementById('backpackGroup').style.display = 'none';
      document.getElementById('backpackOpenGroup').style.display = '';
      log('가방을 열어보니 누군가 휘갈겨 쓴 작은 쪽지가 있다 — "교실 등이 꺼질 때, 사물함 번호의 진실이 드러난다."');
    } else {
      log('가방 안에는 더 이상 단서가 보이지 않는다.');
    }
  };

  window.onPlantClick = function() {
    if (!state.plantChecked) {
      state.plantChecked = true;
      state.hasSmallKey = true;
      addItem('small_key');
      document.getElementById('plantGroup').style.display = 'none';
      document.getElementById('plantDugGroup').style.display = '';
      log('화분의 흙을 헤집어보니, 흙 속에 작고 낡은 황동 열쇠가 묻혀있었다.');
    } else {
      log('화분 속에는 더 이상 아무것도 없다.');
    }
  };

  window.onDeskClick = function() {
    if (state.drawerOpened) {
      showModal(
        '<h3><i class="ti ti-notes" aria-hidden="true"></i>서랍 속 쪽지</h3>' +
        noteHTML() +
        '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
      );
    } else if (state.hasSmallKey) {
      state.drawerOpened = true;
      addItem('note');
      showModal(
        '<h3><i class="ti ti-notes" aria-hidden="true"></i>서랍이 열렸다</h3>' +
        '<p style="font-size:13px;color:var(--color-text-secondary);">작은 열쇠가 서랍에 딱 맞았다. 색이 바랜 쪽지가 들어있다.</p>' +
        noteHTML() +
        '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
      );
    } else {
      log('튼튼한 선생님 책상이다. 서랍은 굳게 잠겨있고, 위에는 책상 스탠드가 놓여있다.');
    }
  };

  window.onLampClick = function() {
    state.lampOn = !state.lampOn;
    const room = document.getElementById('room');
    const bulb = document.getElementById('lampBulb');
    const glow = document.getElementById('lampGlow');
    if (state.lampOn) {
      room.classList.remove('lamp-off');
      bulb.setAttribute('fill', '#FFE680');
      bulb.setAttribute('stroke', '#D4B43A');
      glow.setAttribute('opacity', '0.45');
      log('스탠드 스위치를 딸각 — 교실에 다시 따뜻한 빛이 들어왔다.');
    } else {
      room.classList.add('lamp-off');
      bulb.setAttribute('fill', '#2A2A2A');
      bulb.setAttribute('stroke', '#1A1A1A');
      glow.setAttribute('opacity', '0');
      log('스탠드 스위치를 딸각 — 교실이 어둠에 잠겼다. 무언가 달라 보이는 것 같다...');
    }
  };

  window.onClockClick = function() {
    const h = puzzle.digitPos;
    log('벽시계가 ' + h + '시 정각에서 멈춰있다. 시간은 흐르지 않지만, 시침은 ' + h + '을 또렷이 가리키고 있다.');
  };

  window.onTimetableClick = function() {
    let rows = '';
    for (let p = 1; p <= 6; p++) {
      const c = puzzle.periodToColor[p];
      const col = COLORS[c];
      rows +=
        '<div class="timetable-row">' +
          '<div class="timetable-swatch" style="background:'+col.hex+'"></div>' +
          '<div class="timetable-period">'+p+'교시</div>' +
          '<div class="timetable-subject">'+SUBJECTS[p-1]+'</div>' +
        '</div>';
    }
    showModal(
      '<h3>시간표</h3>' +
      '<p style="font-size:13px;color:var(--color-text-secondary);">교시별로 색이 정해져 있다. 사물함 색과 같다.</p>' +
      '<div class="timetable">' + rows + '</div>' +
      '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
    );
  };

  window.onLockersClick = function() {
    const nums = state.lampOn ? puzzle.lampOn : puzzle.lampOff;
    const stateLabel = state.lampOn
      ? '<span class="modal-state"><i class="ti ti-bulb" aria-hidden="true"></i>교실이 밝다</span>'
      : '<span class="modal-state dark"><i class="ti ti-bulb-off" aria-hidden="true"></i>교실이 어둡다</span>';
    let html =
      '<h3>사물함 6개</h3>' +
      stateLabel +
      '<p style="font-size:13px;color:var(--color-text-secondary);margin-top:10px;">각 사물함 문에 세 자릿수가 적혀있다.</p>' +
      '<div class="lockers-grid">';
    COLORS_ORDER.forEach(c => {
      html +=
        '<div class="locker-card">' +
          '<div class="locker-letter">'+COLORS[c].letter+'</div>' +
          '<div class="locker-door" style="background:'+COLORS[c].hex+'"></div>' +
          '<div class="locker-label">'+COLORS[c].name+'</div>' +
          '<div class="locker-num">'+nums[c]+'</div>' +
        '</div>';
    });
    html += '</div><div class="modal-actions"><button onclick="closeModal()">닫기</button></div>';
    showModal(html);
  };

  window.onPaintingClick = function() {
    if (!state.paintingMoved) {
      state.paintingMoved = true;
      document.getElementById('paintingGroup').style.display = 'none';
      document.getElementById('safeGroup').style.display = '';
      log('액자가 살짝 비스듬했다. 옆으로 밀어내자, 벽 속에 숨겨진 금고가 모습을 드러냈다.');
    } else { window.onSafeClick(); }
  };

  window.onSafeClick = function() {
    if (state.safeOpened) { log('금고는 이미 텅 비어있다.'); return; }
    showModal(
      '<h3>금고 잠금장치</h3>' +
      '<p style="font-size:13px;color:var(--color-text-secondary);">4자리 비밀번호를 입력하세요.</p>' +
      '<div class="code-row">' +
        '<input type="text" maxlength="1" class="code-digit" id="d1" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d2" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d3" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d4" inputmode="numeric">' +
      '</div>' +
      '<div class="code-msg" id="codeMsg"></div>' +
      '<div class="modal-actions">' +
        '<button onclick="closeModal()">취소</button>' +
        '<button class="primary" onclick="trySafeCode()">확인</button>' +
      '</div>'
    );
    setTimeout(() => {
      const digits = ['d1','d2','d3','d4'].map(id => document.getElementById(id));
      digits.forEach((d, i) => {
        d.addEventListener('input', () => {
          d.value = d.value.replace(/[^0-9]/g,'');
          if (d.value && i < 3) digits[i+1].focus();
        });
        d.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !d.value && i > 0) digits[i-1].focus();
          if (e.key === 'Enter') window.trySafeCode();
        });
      });
      digits[0].focus();
    }, 40);
  };

  window.trySafeCode = function() {
    const code = ['d1','d2','d3','d4'].map(id => document.getElementById(id).value).join('');
    if (code === puzzle.code) {
      state.safeOpened = true;
      addItem('golden_key');
      closeModal();
      log('철컥. 금고가 열렸다. 안에는 교실 출입문 열쇠가 들어있었다.');
      const safeDoor = document.getElementById('safeDoor');
      if (safeDoor) safeDoor.setAttribute('fill', '#1F4A2E');
    } else {
      state.wrongAttempts += 1;
      const a = state.wrongAttempts;
      let hint;
      if (a === 1)      hint = '비밀번호가 틀렸다.';
      else if (a === 2) hint = '딸칵... 잠금이 단단하다.';
      else if (a === 3) hint = '쪽지를 다시 보자. 그리고 시간표도.';
      else if (a === 4) hint = '쪽지는 "교시"를 알려준다. 시간표는 그 교시의 "색"을 알려준다.';
      else if (a === 5) hint = '어떤 색 사물함을, 어떤 순서로 봐야 할지, 두 단서를 합쳐야 한다.';
      else if (a === 6) hint = '사물함 번호는 세 자리. 그 중 단 한 자리만이 답이다.';
      else if (a === 7) hint = '교실 안에서 "멈춰버린 자"는 무엇인가? 시침이 가리키는 숫자가 곧 답의 자리다.';
      else if (a === 8) hint = '그리고 진짜 사물함 번호는 빛이 꺼졌을 때만 보인다.';
      else              hint = '쪽지 → 시간표(색) → 어둠 속 사물함 번호 → 시계가 가리키는 자리수. 순서대로.';
      document.getElementById('codeMsg').textContent = hint;
      ['d1','d2','d3','d4'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('d1').focus();
    }
  };

  window.onDoorClick = function() {
    if (state.won) return;
    if (state.inv.includes('golden_key')) {
      state.won = true;
      const a = state.wrongAttempts;
      let rating;
      if (a === 0)      rating = '단 한 번의 실수도 없이 완벽하게.';
      else if (a <= 2)  rating = '약간의 시행착오 끝에.';
      else if (a <= 5)  rating = '몇 번의 헛수고 끝에.';
      else if (a <= 10) rating = '꽤 많은 시도 끝에 마침내.';
      else              rating = '수많은 시도 끝에 마침내.';
      showModal(
        '<div class="win-title">탈출 성공</div>' +
        '<p>열쇠가 자물쇠와 딸각 맞물렸다. 교실 문이 천천히 열리며, 복도의 불빛이 들이쳤다.</p>' +
        '<p style="color:var(--color-text-secondary);font-size:13px;">'+rating+' 방과 후의 비밀을 풀고 학교 밖으로. (틀린 비밀번호 '+a+'회)</p>' +
        '<div class="modal-actions" style="margin-top:14px;"><button onclick="restart()">다시 도전</button></div>'
      );
    } else {
      log('교실 문이 단단히 잠겨있다. 특별한 열쇠가 필요해 보인다.');
    }
  };

  function onInvClick(item) {
    if (item === 'note') {
      showModal(
        '<h3><i class="ti ti-notes" aria-hidden="true"></i>쪽지</h3>' +
        noteHTML() +
        '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
      );
    } else if (item === 'small_key') log('작고 낡은 황동 열쇠다. 작은 자물쇠에 맞을 것 같다.');
    else if (item === 'golden_key')  log('교실 출입문 열쇠다. 분명 그 문을 열어줄 것이다.');
  }

  window.restart = function() {
    puzzle = generatePuzzle();
    state = { inv: [], hasSmallKey: false, plantChecked: false, drawerOpened: false, paintingMoved: false, safeOpened: false, lampOn: true, backpackChecked: false, wrongAttempts: 0, won: false };
    document.getElementById('backpackGroup').style.display = '';
    document.getElementById('backpackOpenGroup').style.display = 'none';
    document.getElementById('plantGroup').style.display = '';
    document.getElementById('plantDugGroup').style.display = 'none';
    document.getElementById('paintingGroup').style.display = '';
    document.getElementById('safeGroup').style.display = 'none';
    document.getElementById('room').classList.remove('lamp-off');
    const bulb = document.getElementById('lampBulb');
    const glow = document.getElementById('lampGlow');
    bulb.setAttribute('fill', '#FFE680');
    bulb.setAttribute('stroke', '#D4B43A');
    glow.setAttribute('opacity', '0.45');
    const safeDoor = document.getElementById('safeDoor');
    if (safeDoor) safeDoor.setAttribute('fill', '#2A2A2A');
    updateClockHand(puzzle.digitPos);
    renderInventory();
    closeModal();
    log('방과 후, 텅 빈 교실에서 깨어났다. 문은 잠겨있다. 사물함, 책상, 시간표, 벽시계… 무언가 단서가 숨어있을 것 같다.');
  };

  document.getElementById('restartBtn').addEventListener('click', window.restart);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') closeModal();
  });

  updateClockHand(puzzle.digitPos);
})();
</script>
</body>
</html>
