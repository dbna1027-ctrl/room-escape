<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방과 후 교실 — 방탈출</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    --font-mono: "SF Mono", "Menlo", Consolas, monospace;
    --font-serif: "Times New Roman", "Nanum Myeongjo", serif;
    --color-text-primary: #1A1A19;
    --color-text-secondary: #5F5E5A;
    --color-text-tertiary: #888780;
    --color-text-info: #185FA5;
    --color-text-danger: #A32D2D;
    --color-text-success: #0F6E56;
    --color-background-page: #F5F4EF;
    --color-background-primary: #FFFFFF;
    --color-background-secondary: #F1EFE8;
    --color-background-tertiary: #E5E2D8;
    --color-background-info: #E6F1FB;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-info: #378ADD;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #ECEBE6; --color-text-secondary: #B4B2A9; --color-text-tertiary: #888780;
      --color-text-info: #85B7EB; --color-text-danger: #F09595; --color-text-success: #5DCAA5;
      --color-background-page: #1C1B18; --color-background-primary: #2A2A27; --color-background-secondary: #222220;
      --color-background-tertiary: #34332F; --color-background-info: #0C447C;
      --color-border-tertiary: rgba(255,255,255,0.15); --color-border-secondary: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-page); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
  .wrap { width: 100%; max-width: 720px; }
  button { font-family: inherit; font-size: 13px; padding: 8px 14px; background: transparent; color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; transition: background 0.15s; }
  button:hover { background: var(--color-background-secondary); }

  .escape-game { padding: 1rem 0; }
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
  .game-title { font-size: 18px; font-weight: 500; }
  .game-sub { font-size: 13px; color: var(--color-text-secondary); margin-left: 8px; }
  .room { position: relative; width: 100%; aspect-ratio: 17 / 9; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); background: #D9C9B0; }
  .room svg { display: block; width: 100%; height: 100%; }
  .hotspot { cursor: pointer; transition: filter 0.15s; }
  .hotspot:hover { filter: brightness(1.13); }
  .message-log { margin-top: 12px; padding: 14px 16px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); min-height: 58px; font-size: 14px; line-height: 1.6; }
  .inventory { margin-top: 12px; padding: 12px 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
  .inventory-title { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .inventory-items { display: flex; gap: 8px; flex-wrap: wrap; min-height: 32px; align-items: center; }
  .inv-item { padding: 6px 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .inv-item:hover { background: var(--color-background-tertiary); }
  .inv-empty { color: var(--color-text-tertiary); font-size: 13px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--color-background-primary); padding: 22px 24px; border-radius: var(--border-radius-lg); max-width: 480px; width: 100%; max-height: calc(100vh - 40px); overflow-y: auto; border: 0.5px solid var(--color-border-tertiary); }
  .modal h3 { margin: 0 0 6px; font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .modal p { margin: 6px 0; font-size: 14px; line-height: 1.55; }

  .chalkboard-display { background: linear-gradient(to bottom, #1F3F2E, #2A4A35); color: #E8E4D8; padding: 18px 20px; border-radius: 6px; font-family: var(--font-serif); border: 5px solid #5A3825; box-shadow: inset 0 0 30px rgba(255,255,255,0.04); margin: 12px 0; }
  .chalk-title { text-align: center; font-size: 13px; letter-spacing: 1.5px; border-bottom: 0.5px dashed rgba(232,228,216,0.3); padding-bottom: 8px; margin-bottom: 12px; font-style: italic; color: #FFE680; }
  .chalk-clues { list-style: none; padding: 0; margin: 0; font-size: 13.5px; line-height: 1.7; }
  .chalk-clues li { padding: 4px 0 4px 16px; position: relative; }
  .chalk-clues li::before { content: "·"; position: absolute; left: 0; color: #FFE680; font-size: 20px; line-height: 1; }

  .note-paper { margin: 12px 0; padding: 14px 16px; background: #F5EAC8; color: #3A2818; border: 0.5px solid #B89860; border-radius: var(--border-radius-md); font-family: var(--font-serif); font-size: 14px; line-height: 1.75; box-shadow: inset 0 0 12px rgba(120,80,30,0.08); }
  .note-paper strong { font-weight: 500; }
  .note-paper .note-instr { display: block; margin-top: 10px; padding-top: 10px; border-top: 0.5px dashed #B89860; font-size: 12px; color: #6A5535; font-style: italic; }

  .scratch-pad-wrap { margin: 14px 0 8px; }
  .scratch-pad-title { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .scratch-pad { width: 100%; border-collapse: collapse; font-size: 13px; }
  .scratch-pad th, .scratch-pad td { padding: 5px 4px; text-align: center; border: 0.5px solid var(--color-border-tertiary); }
  .scratch-pad th { background: var(--color-background-secondary); font-weight: 500; font-size: 12px; color: var(--color-text-secondary); }
  .scratch-pad td:first-child { background: var(--color-background-secondary); font-weight: 500; color: var(--color-text-secondary); width: 50px; }
  .scratch-cell { padding: 5px 8px; background: var(--color-background-primary); border: 0.5px dashed var(--color-border-secondary); border-radius: 4px; cursor: pointer; min-width: 80px; font-size: 12px; font-family: inherit; color: var(--color-text-primary); transition: background 0.12s; }
  .scratch-cell:hover { background: var(--color-background-tertiary); }
  .scratch-cell .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin-right: 5px; border: 0.5px solid rgba(0,0,0,0.25); }

  /* Circuit puzzle UI */
  .circuit-instr { font-size: 13px; color: var(--color-text-secondary); margin: 10px 0; line-height: 1.6; }
  .circuit-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 14px 0; }
  .circuit-power-side, .circuit-out-side { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; color: var(--color-text-secondary); }
  .circuit-power-side .arrow, .circuit-out-side .arrow { font-size: 16px; color: var(--color-text-info); }
  .circuit-grid { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 3px; background: #2A2A2A; padding: 6px; border-radius: 6px; }
  .circuit-tile { background: #E5E2D8; cursor: pointer; transition: transform 0.06s; position: relative; }
  .circuit-tile:hover { background: #EDEAE0; }
  .circuit-tile:active { transform: scale(0.93); }
  .circuit-tile svg { display: block; width: 100%; height: 100%; }
  .circuit-status { text-align: center; padding: 10px 12px; font-size: 14px; margin: 12px 0 4px; border-radius: 6px; font-weight: 500; }
  .circuit-status.off { background: #5A2A2A; color: #FFC0C0; }
  .circuit-status.on { background: #2A5A2A; color: #C0FFC0; }

  .code-row { display: flex; gap: 8px; justify-content: center; margin: 14px 0 6px; }
  .code-digit { width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); font-family: inherit; }
  .code-digit:focus { outline: none; box-shadow: 0 0 0 2px var(--color-border-info); }
  .code-msg { font-size: 13px; text-align: center; min-height: 18px; color: var(--color-text-danger); margin-top: 4px; line-height: 1.4; }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
  .modal-actions button { flex: 1; }
  .modal-actions button.primary { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .win-title { font-size: 20px; font-weight: 500; color: var(--color-text-success); text-align: center; margin-bottom: 8px; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>
<body>
<div class="wrap">
<h2 class="sr-only">방과 후 교실 회로+논리 추리 방탈출. 전기 패널의 회로를 연결해 사물함에 전기를 공급하고, 칠판 단서로 사물함 주인을 추리해 4자리 비밀번호를 풀어 교실을 탈출하세요.</h2>

<div class="escape-game">
  <div class="game-header">
    <div>
      <span class="game-title">방과 후 교실</span>
      <span class="game-sub">회로를 잇고, 사물함의 주인을 찾아라</span>
    </div>
    <button id="restartBtn">처음부터</button>
  </div>

  <div class="room" id="room">
    <svg viewBox="0 0 680 360" preserveAspectRatio="xMidYMid meet">
      <rect width="680" height="260" fill="#DCD0B4"/>
      <rect y="260" width="680" height="100" fill="#8A7A60"/>
      <line x1="0" y1="288" x2="680" y2="288" stroke="#6A5840" stroke-width="0.4"/>
      <line x1="0" y1="318" x2="680" y2="318" stroke="#6A5840" stroke-width="0.4"/>
      <line x1="0" y1="348" x2="680" y2="348" stroke="#6A5840" stroke-width="0.4"/>

      <!-- electric panel / fuse box -->
      <g class="hotspot" onclick="onFuseBoxClick()">
        <rect x="22" y="20" width="128" height="50" fill="#7A7060" stroke="#3A2818" stroke-width="1.5"/>
        <rect x="26" y="24" width="120" height="42" fill="#8A7560" stroke="#3A2818" stroke-width="0.5"/>
        <rect x="30" y="28" width="86" height="7" fill="#1A1A19"/>
        <text x="73" y="33.5" font-size="5" fill="#E8E4D8" text-anchor="middle" font-weight="bold">전기 패널 — 위험</text>
        <circle id="fuseStatus" cx="135" cy="32" r="3.5" fill="#A32D2D"/>
        <g fill="#3A3A3A">
          <rect x="32" y="44" width="13" height="18" stroke="#1A1A1A" stroke-width="0.4"/>
          <rect x="50" y="44" width="13" height="18" stroke="#1A1A1A" stroke-width="0.4"/>
          <rect x="68" y="44" width="13" height="18" stroke="#1A1A1A" stroke-width="0.4"/>
          <rect x="86" y="44" width="13" height="18" stroke="#1A1A1A" stroke-width="0.4"/>
          <rect x="104" y="44" width="13" height="18" stroke="#1A1A1A" stroke-width="0.4"/>
          <rect x="122" y="44" width="13" height="18" stroke="#1A1A1A" stroke-width="0.4"/>
        </g>
        <g fill="#C44545">
          <rect x="36" y="49" width="5" height="8" rx="1"/>
          <rect x="54" y="49" width="5" height="8" rx="1"/>
          <rect x="72" y="49" width="5" height="8" rx="1"/>
          <rect x="90" y="49" width="5" height="8" rx="1"/>
          <rect x="108" y="49" width="5" height="8" rx="1"/>
          <rect x="126" y="49" width="5" height="8" rx="1"/>
        </g>
      </g>

      <!-- 4 lockers -->
      <g class="hotspot" onclick="onLockersClick()">
        <rect x="18" y="80" width="142" height="180" fill="#2A2A2A"/>
        <g stroke="#1A1A1A" stroke-width="0.5">
          <rect x="22" y="84" width="33" height="172" fill="#C44545"/>
          <rect x="57" y="84" width="33" height="172" fill="#D4B43A"/>
          <rect x="92" y="84" width="33" height="172" fill="#4A7A3E"/>
          <rect x="127" y="84" width="33" height="172" fill="#3B6BA8"/>
        </g>
        <g stroke="#1A1A1A" stroke-width="0.4" opacity="0.7">
          <line x1="27" y1="91" x2="50" y2="91"/><line x1="27" y1="94" x2="50" y2="94"/>
          <line x1="62" y1="91" x2="85" y2="91"/><line x1="62" y1="94" x2="85" y2="94"/>
          <line x1="97" y1="91" x2="120" y2="91"/><line x1="97" y1="94" x2="120" y2="94"/>
          <line x1="132" y1="91" x2="155" y2="91"/><line x1="132" y1="94" x2="155" y2="94"/>
        </g>
        <!-- digit plates (start "off"/dim) -->
        <g>
          <rect id="plateRed" x="28" y="122" width="22" height="22" fill="#5A5A5A" stroke="#666" stroke-width="0.5"/>
          <text id="lockerDigitRed" x="39" y="139" font-size="14" font-weight="bold" font-family="monospace" text-anchor="middle" fill="#3A3A3A">?</text>
          <rect id="plateYellow" x="63" y="122" width="22" height="22" fill="#5A5A5A" stroke="#666" stroke-width="0.5"/>
          <text id="lockerDigitYellow" x="74" y="139" font-size="14" font-weight="bold" font-family="monospace" text-anchor="middle" fill="#3A3A3A">?</text>
          <rect id="plateGreen" x="98" y="122" width="22" height="22" fill="#5A5A5A" stroke="#666" stroke-width="0.5"/>
          <text id="lockerDigitGreen" x="109" y="139" font-size="14" font-weight="bold" font-family="monospace" text-anchor="middle" fill="#3A3A3A">?</text>
          <rect id="plateBlue" x="133" y="122" width="22" height="22" fill="#5A5A5A" stroke="#666" stroke-width="0.5"/>
          <text id="lockerDigitBlue" x="144" y="139" font-size="14" font-weight="bold" font-family="monospace" text-anchor="middle" fill="#3A3A3A">?</text>
        </g>
        <g fill="#444">
          <rect x="48" y="195" width="3" height="10" rx="1"/>
          <rect x="83" y="195" width="3" height="10" rx="1"/>
          <rect x="118" y="195" width="3" height="10" rx="1"/>
          <rect x="153" y="195" width="3" height="10" rx="1"/>
        </g>
      </g>

      <!-- chalkboard -->
      <g class="hotspot" onclick="onChalkboardClick()">
        <rect x="175" y="45" width="245" height="158" fill="#5A3825" stroke="#3A1818" stroke-width="2.5"/>
        <rect x="185" y="55" width="225" height="138" fill="#2A4A35" stroke="#3A2818" stroke-width="0.5"/>
        <line x1="195" y1="75" x2="285" y2="75" stroke="#E8E4D8" stroke-width="0.4" opacity="0.5"/>
        <line x1="200" y1="85" x2="270" y2="85" stroke="#E8E4D8" stroke-width="0.4" opacity="0.35"/>
        <line x1="195" y1="95" x2="260" y2="95" stroke="#E8E4D8" stroke-width="0.4" opacity="0.25"/>
        <text x="297" y="124" font-size="14" font-family="serif" font-style="italic" fill="#E8E4D8" text-anchor="middle">사물함의 주인을 찾아라</text>
        <text x="297" y="148" font-size="9" font-family="serif" fill="#FFE680" text-anchor="middle" opacity="0.9">— 클릭하여 단서 보기 —</text>
        <line x1="200" y1="165" x2="295" y2="165" stroke="#E8E4D8" stroke-width="0.4" opacity="0.4"/>
        <line x1="200" y1="175" x2="275" y2="175" stroke="#E8E4D8" stroke-width="0.4" opacity="0.3"/>
        <line x1="200" y1="183" x2="250" y2="183" stroke="#E8E4D8" stroke-width="0.4" opacity="0.2"/>
        <rect x="175" y="200" width="245" height="6" fill="#3A2818"/>
        <rect x="195" y="201.5" width="10" height="3" fill="#E8E4D8" rx="1"/>
        <rect x="225" y="202" width="6" height="2.5" fill="#D44545" rx="1"/>
      </g>

      <!-- framed picture (hides safe) -->
      <g id="paintingGroup" class="hotspot" onclick="onPaintingClick()">
        <rect x="445" y="78" width="100" height="115" fill="#4A3825"/>
        <rect x="453" y="86" width="84" height="99" fill="#E8DBC8"/>
        <rect x="468" y="135" width="50" height="42" fill="#A85040"/>
        <path d="M 463 135 L 493 117 L 523 135 Z" fill="#7A3525"/>
        <rect x="486" y="158" width="14" height="19" fill="#3A1810"/>
        <g fill="#3B6BA8">
          <rect x="473" y="145" width="6" height="6"/>
          <rect x="483" y="145" width="6" height="6"/>
          <rect x="507" y="145" width="6" height="6"/>
        </g>
        <text x="495" y="108" font-size="7" font-family="serif" fill="#5A3525" text-anchor="middle">우리 학교</text>
      </g>

      <!-- safe (hidden) -->
      <g id="safeGroup" class="hotspot" style="display:none;" onclick="onSafeClick()">
        <rect x="450" y="85" width="92" height="98" fill="#3A3A3A" stroke="#1A1A1A" stroke-width="2"/>
        <rect id="safeDoor" x="460" y="95" width="74" height="78" fill="#2A2A2A" stroke="#1A1A1A"/>
        <circle cx="518" cy="132" r="9" fill="#5A5A5A" stroke="#1A1A1A" stroke-width="1.3"/>
        <circle cx="518" cy="132" r="5" fill="#3A3A3A"/>
        <rect x="468" y="105" width="42" height="14" rx="2" fill="#0F0F0F" stroke="#1A1A1A"/>
        <text x="489" y="115" font-size="8" fill="#5A8A5A" text-anchor="middle" font-family="monospace">CODE</text>
        <rect x="534" y="92" width="5" height="8" fill="#1A1A1A"/>
        <rect x="534" y="168" width="5" height="8" fill="#1A1A1A"/>
      </g>

      <!-- classroom door -->
      <g class="hotspot" onclick="onDoorClick()">
        <rect x="555" y="48" width="115" height="222" fill="#7A5F3F" stroke="#3A2818" stroke-width="2"/>
        <rect x="567" y="60" width="42" height="84" fill="#6A4F30" stroke="#3A2818"/>
        <rect x="619" y="60" width="42" height="84" fill="#6A4F30" stroke="#3A2818"/>
        <rect x="572" y="72" width="32" height="68" fill="#A8C8D8" stroke="#3A2818" stroke-width="0.6"/>
        <line x1="572" y1="106" x2="604" y2="106" stroke="#3A2818" stroke-width="0.4"/>
        <line x1="588" y1="72" x2="588" y2="140" stroke="#3A2818" stroke-width="0.4"/>
        <rect x="624" y="72" width="32" height="68" fill="#A8C8D8" stroke="#3A2818" stroke-width="0.6"/>
        <line x1="624" y1="106" x2="656" y2="106" stroke="#3A2818" stroke-width="0.4"/>
        <line x1="640" y1="72" x2="640" y2="140" stroke="#3A2818" stroke-width="0.4"/>
        <rect x="567" y="152" width="42" height="100" fill="#6A4F30" stroke="#3A2818"/>
        <rect x="619" y="152" width="42" height="100" fill="#6A4F30" stroke="#3A2818"/>
        <circle cx="571" cy="200" r="4" fill="#D4B43A" stroke="#8A7020"/>
        <rect x="568" y="203" width="6" height="14" fill="#D4B43A" stroke="#8A7020"/>
      </g>

      <!-- teacher's desk -->
      <g class="hotspot" onclick="onDeskClick()">
        <rect x="200" y="222" width="220" height="12" fill="#A88B65" stroke="#5A4530"/>
        <rect x="210" y="234" width="200" height="60" fill="#8B6F47" stroke="#5A4530"/>
        <rect x="210" y="234" width="10" height="60" fill="#5A4530"/>
        <rect x="400" y="234" width="10" height="60" fill="#5A4530"/>
        <rect x="230" y="244" width="65" height="28" fill="#7A5F3F" stroke="#3A2818"/>
        <circle cx="262" cy="258" r="2.5" fill="#D4B43A"/>
      </g>

      <!-- plant pot -->
      <g id="plantGroup" class="hotspot" onclick="onPlantClick()">
        <ellipse cx="470" cy="305" rx="22" ry="4" fill="#4A3220" opacity="0.5"/>
        <path d="M 450 270 L 490 270 L 486 302 L 454 302 Z" fill="#A85A4A" stroke="#6A3525" stroke-width="1.2"/>
        <ellipse cx="470" cy="270" rx="20" ry="3" fill="#7A4030"/>
        <ellipse cx="463" cy="245" rx="9" ry="14" fill="#4A7A3E" transform="rotate(-25 463 245)"/>
        <ellipse cx="477" cy="247" rx="9" ry="14" fill="#5A8A4E" transform="rotate(20 477 247)"/>
        <ellipse cx="470" cy="240" rx="10" ry="12" fill="#3E6A35"/>
        <path d="M 470 255 L 470 268" stroke="#3E5025" stroke-width="1.5"/>
      </g>
      <g id="plantDugGroup" style="display:none;">
        <ellipse cx="470" cy="305" rx="22" ry="4" fill="#4A3220" opacity="0.5"/>
        <path d="M 450 270 L 490 270 L 486 302 L 454 302 Z" fill="#A85A4A" stroke="#6A3525" stroke-width="1.2"/>
        <ellipse cx="470" cy="270" rx="20" ry="3" fill="#5A3020"/>
        <ellipse cx="463" cy="245" rx="9" ry="14" fill="#4A7A3E" transform="rotate(-25 463 245)" opacity="0.5"/>
        <ellipse cx="477" cy="247" rx="9" ry="14" fill="#5A8A4E" transform="rotate(20 477 247)" opacity="0.5"/>
        <ellipse cx="470" cy="240" rx="10" ry="12" fill="#3E6A35" opacity="0.5"/>
      </g>

      <!-- student backpack -->
      <g id="backpackGroup" class="hotspot" onclick="onBackpackClick()">
        <ellipse cx="310" cy="345" rx="44" ry="4" fill="#3A2818" opacity="0.45"/>
        <path d="M 275 298 Q 275 292 285 292 L 335 292 Q 345 292 345 298 L 348 340 Q 348 348 338 348 L 282 348 Q 272 348 272 340 Z" fill="#3B5BA8" stroke="#1F3F70" stroke-width="1"/>
        <path d="M 282 318 L 338 318 L 341 340 Q 341 343 338 343 L 282 343 Q 279 343 279 340 Z" fill="#2F4878" stroke="#1F3F70" stroke-width="0.8"/>
        <rect x="305" y="327" width="10" height="3" fill="#D4843A"/>
        <path d="M 295 292 Q 295 282 305 282 L 315 282 Q 325 282 325 292" fill="none" stroke="#1F3F70" stroke-width="3"/>
        <circle cx="290" cy="306" r="1.5" fill="#1F3F70"/>
        <circle cx="330" cy="306" r="1.5" fill="#1F3F70"/>
      </g>
      <g id="backpackOpenGroup" style="display:none;">
        <ellipse cx="310" cy="345" rx="44" ry="4" fill="#3A2818" opacity="0.45"/>
        <path d="M 275 305 Q 275 295 285 295 L 335 295 Q 345 295 345 305 L 348 340 Q 348 348 338 348 L 282 348 Q 272 348 272 340 Z" fill="#3B5BA8" stroke="#1F3F70" stroke-width="1"/>
        <path d="M 275 305 Q 290 290 310 290 Q 330 290 345 305 L 345 310 L 275 310 Z" fill="#2F4878" stroke="#1F3F70" stroke-width="0.8"/>
        <text x="310" y="333" font-size="6" fill="#E8E4D8" text-anchor="middle" font-style="italic">쪽지를 발견했다</text>
      </g>
    </svg>
  </div>

  <div class="message-log" id="messageLog">
    방과 후, 텅 빈 교실에서 깨어났다. 사물함은 어둡고, 칠판에는 분필 자국이 보인다. 단서를 모으고 사물함에 전기를 통하게 해야 할 것 같다.
  </div>

  <div class="inventory">
    <div class="inventory-title">소지품</div>
    <div class="inventory-items" id="inventoryItems">
      <span class="inv-empty">아직 가진 것이 없다</span>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>
</div>

<script>
(function(){
  const COLORS = {
    red:    { name: '빨강',  hex: '#C44545' },
    yellow: { name: '노랑',  hex: '#D4B43A' },
    green:  { name: '초록',  hex: '#4A7A3E' },
    blue:   { name: '파랑',  hex: '#3B6BA8' }
  };
  const SOLUTION_COLOR = { pos1: 'yellow', pos2: 'green', pos3: 'red', pos4: 'blue' };

  const CHALKBOARD_CLUES = [
    '1번 자리(가장 앞) 학생은 수학을 좋아한다.',
    '노랑 사물함과 초록 사물함은 바로 옆자리에 있다.',
    '미술을 좋아하는 학생의 사물함은 빨강이다.',
    '영어를 좋아하는 학생의 바로 옆자리에는 미술을 좋아하는 학생이 앉는다.',
    '빨강 사물함은 노랑 사물함보다 뒷자리에 있다.'
  ];
  const DRAWER_CLUE   = '영어를 좋아하는 학생의 사물함은 초록이다.';
  const BACKPACK_CLUE = '과학을 좋아하는 학생은 가장 뒷자리(4번)에 앉는다.';

  // --- Circuit puzzle constants ---
  // Layout uses E = elbow (default T+R), S = straight (default L+R)
  // Middle row is mostly Straight but with elbow in col 0 — straight middle is broken so player must detour
  const CIRCUIT_LAYOUT = [
    ['E','S','E'],
    ['E','S','E'],
    ['E','S','E']
  ];
  // Solution requires routing around: middle (1,0)/(1,2) are elbows, can't carry L→R straight
  const TILE_BASE = { E: ['T','R'], S: ['L','R'] };
  const DIR_ORDER = ['T','R','B','L'];

  function rotateDir(dir, n) {
    return DIR_ORDER[(DIR_ORDER.indexOf(dir) + n + 4) % 4];
  }
  function getTileConnections(type, rotation) {
    return TILE_BASE[type].map(d => rotateDir(d, rotation));
  }

  function isCircuitSolved() {
    const visited = [[false,false,false],[false,false,false],[false,false,false]];
    const startR = 1, startC = 0;
    const startConns = getTileConnections(CIRCUIT_LAYOUT[startR][startC], circuitRotations[startR][startC]);
    if (!startConns.includes('L')) return false;
    const queue = [[startR, startC, 'L']];
    visited[startR][startC] = true;
    while (queue.length) {
      const [r, c, fromDir] = queue.shift();
      const conns = getTileConnections(CIRCUIT_LAYOUT[r][c], circuitRotations[r][c]);
      for (const dir of conns) {
        if (dir === fromDir) continue;
        let nr = r, nc = c, neighborDir;
        if (dir === 'T') { nr = r - 1; neighborDir = 'B'; }
        else if (dir === 'B') { nr = r + 1; neighborDir = 'T'; }
        else if (dir === 'L') { nc = c - 1; neighborDir = 'R'; }
        else if (dir === 'R') { nc = c + 1; neighborDir = 'L'; }
        if (nr < 0 || nr >= 3 || nc < 0 || nc >= 3) {
          if (r === 1 && c === 2 && dir === 'R') return true;
          continue;
        }
        if (visited[nr][nc]) continue;
        const nConns = getTileConnections(CIRCUIT_LAYOUT[nr][nc], circuitRotations[nr][nc]);
        if (!nConns.includes(neighborDir)) continue;
        visited[nr][nc] = true;
        queue.push([nr, nc, neighborDir]);
      }
    }
    return false;
  }

  function randomizeCircuit() {
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        circuitRotations[r][c] = Math.floor(Math.random() * 4);
      }
    }
    // Make sure not already solved on start
    if (isCircuitSolved()) {
      circuitRotations[0][0] = (circuitRotations[0][0] + 1) % 4;
    }
  }

  function tileSvg(type, rotation, powered) {
    const size = 60, c = size / 2;
    const conns = getTileConnections(type, rotation);
    const color = powered ? '#FFD400' : '#3A3A3A';
    let lines = '';
    conns.forEach(d => {
      let ex, ey;
      if (d === 'T') { ex = c; ey = 0; }
      else if (d === 'R') { ex = size; ey = c; }
      else if (d === 'B') { ex = c; ey = size; }
      else { ex = 0; ey = c; }
      lines += '<line x1="'+c+'" y1="'+c+'" x2="'+ex+'" y2="'+ey+'" stroke="'+color+'" stroke-width="10" stroke-linecap="round"/>';
    });
    const dot = '<circle cx="'+c+'" cy="'+c+'" r="5" fill="'+color+'"/>';
    return '<svg viewBox="0 0 '+size+' '+size+'">'+lines+dot+'</svg>';
  }

  function generatePuzzle() {
    const pool = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5).slice(0, 4);
    const lockerDigits = { red: pool[0], yellow: pool[1], green: pool[2], blue: pool[3] };
    const code = ['pos1','pos2','pos3','pos4'].map(p => lockerDigits[SOLUTION_COLOR[p]]).join('');
    return { lockerDigits, code };
  }

  let puzzle = generatePuzzle();
  let circuitRotations = [[0,0,0],[0,0,0],[0,0,0]];
  randomizeCircuit();
  let state = {
    inv: [], hasSmallKey: false, plantChecked: false,
    drawerOpened: false, backpackChecked: false,
    circuitSolved: false,
    paintingMoved: false, safeOpened: false,
    wrongAttempts: 0, won: false
  };
  let scratchPad = {
    pos1: { color: null, subject: null }, pos2: { color: null, subject: null },
    pos3: { color: null, subject: null }, pos4: { color: null, subject: null }
  };

  const itemNames = {
    small_key:  { icon: 'ti-key',    name: '작은 열쇠' },
    note:       { icon: 'ti-notes',  name: '서랍 쪽지' },
    bp_note:    { icon: 'ti-note',   name: '가방 쪽지' },
    golden_key: { icon: 'ti-key',    name: '교실 열쇠' }
  };
  const SCRATCH_COLOR_CYCLE   = [null, 'red', 'yellow', 'green', 'blue'];
  const SCRATCH_SUBJECT_CYCLE = [null, '수학', '영어', '미술', '과학'];

  function log(msg) { document.getElementById('messageLog').textContent = msg; }
  function showModal(html) { document.getElementById('modalBox').innerHTML = html; document.getElementById('modalOverlay').classList.add('show'); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  window.closeModal = closeModal;

  function renderInventory() {
    const div = document.getElementById('inventoryItems');
    if (state.inv.length === 0) { div.innerHTML = '<span class="inv-empty">아직 가진 것이 없다</span>'; return; }
    div.innerHTML = state.inv.map(i => {
      const it = itemNames[i];
      return '<span class="inv-item" data-id="'+i+'"><i class="ti '+it.icon+'" aria-hidden="true"></i>'+it.name+'</span>';
    }).join('');
    div.querySelectorAll('.inv-item').forEach(el => { el.addEventListener('click', () => onInvClick(el.dataset.id)); });
  }
  function addItem(item) { if (!state.inv.includes(item)) { state.inv.push(item); renderInventory(); } }

  function updateLockerDigitsInSVG() {
    const COLOR_KEYS = ['Red','Yellow','Green','Blue'];
    const cMap = { Red: 'red', Yellow: 'yellow', Green: 'green', Blue: 'blue' };
    COLOR_KEYS.forEach(k => {
      const txt = document.getElementById('lockerDigit'+k);
      const plt = document.getElementById('plate'+k);
      if (state.circuitSolved) {
        txt.textContent = puzzle.lockerDigits[cMap[k]];
        txt.setAttribute('fill', '#1A1A1A');
        plt.setAttribute('fill', '#F0E8D0');
      } else {
        txt.textContent = '?';
        txt.setAttribute('fill', '#3A3A3A');
        plt.setAttribute('fill', '#5A5A5A');
      }
    });
  }

  // ====================== Chalkboard ======================
  function chalkboardModalHTML() {
    let cluesHTML = '<ul class="chalk-clues">';
    CHALKBOARD_CLUES.forEach(c => { cluesHTML += '<li>' + c + '</li>'; });
    cluesHTML += '</ul>';
    return (
      '<h3>칠판</h3>' +
      '<p style="font-size:13px;color:var(--color-text-secondary);">분필로 단서가 쓰여있다.</p>' +
      '<div class="chalkboard-display"><div class="chalk-title">[ 사물함의 주인을 찾아라 ]</div>' + cluesHTML + '</div>' +
      scratchPadHTML() +
      '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
    );
  }
  function scratchPadHTML() {
    let html = '<div class="scratch-pad-wrap"><div class="scratch-pad-title">추리 메모 (셀을 클릭해 후보를 채워보세요. 검증은 안 합니다)</div>';
    html += '<table class="scratch-pad"><thead><tr><th>자리</th><th>사물함 색</th><th>좋아하는 과목</th></tr></thead><tbody>';
    ['pos1','pos2','pos3','pos4'].forEach((p, i) => {
      const c = scratchPad[p].color, s = scratchPad[p].subject;
      html += '<tr><td>' + (i+1) + '번</td>';
      html += '<td><button class="scratch-cell" data-pos="'+p+'" data-attr="color">';
      html += c ? '<span class="dot" style="background:'+COLORS[c].hex+'"></span>'+COLORS[c].name : '?';
      html += '</button></td>';
      html += '<td><button class="scratch-cell" data-pos="'+p+'" data-attr="subject">' + (s || '?') + '</button></td></tr>';
    });
    return html + '</tbody></table></div>';
  }
  function attachScratchListeners() {
    document.querySelectorAll('.scratch-cell').forEach(el => {
      el.addEventListener('click', () => {
        const pos = el.dataset.pos, attr = el.dataset.attr;
        const cycle = attr === 'color' ? SCRATCH_COLOR_CYCLE : SCRATCH_SUBJECT_CYCLE;
        const cur = scratchPad[pos][attr];
        const next = cycle[(cycle.indexOf(cur) + 1) % cycle.length];
        scratchPad[pos][attr] = next;
        if (attr === 'color') el.innerHTML = next ? '<span class="dot" style="background:'+COLORS[next].hex+'"></span>'+COLORS[next].name : '?';
        else el.textContent = next || '?';
      });
    });
  }
  window.onChalkboardClick = function() { showModal(chalkboardModalHTML()); attachScratchListeners(); };

  // ====================== Fuse box / Circuit ======================
  function circuitModalHTML() {
    const solved = state.circuitSolved;
    let gridHTML = '<div class="circuit-grid">';
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        gridHTML += '<div class="circuit-tile" id="ctile-'+r+'-'+c+'" onclick="rotateTile('+r+','+c+')">' +
                    tileSvg(CIRCUIT_LAYOUT[r][c], circuitRotations[r][c], solved) + '</div>';
      }
    }
    gridHTML += '</div>';
    const statusCls = solved ? 'on' : 'off';
    const statusTxt = solved ? '⚡ 전원 연결됨! 사물함이 켜졌다.' : '✕ 전원 차단됨';
    return (
      '<h3><i class="ti ti-bolt" aria-hidden="true"></i>전기 패널</h3>' +
      '<p class="circuit-instr">왼쪽에서 들어오는 전원이 오른쪽 사물함까지 이어지도록 회로 타일을 회전시키세요. 타일을 클릭하면 90°씩 돌아갑니다.</p>' +
      '<div class="circuit-row">' +
        '<div class="circuit-power-side"><div>전원</div><div class="arrow">▶</div></div>' +
        gridHTML +
        '<div class="circuit-out-side"><div class="arrow">▶</div><div>사물함</div></div>' +
      '</div>' +
      '<div class="circuit-status '+statusCls+'" id="circuitStatus">' + statusTxt + '</div>' +
      '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
    );
  }

  window.onFuseBoxClick = function() { showModal(circuitModalHTML()); };

  window.rotateTile = function(r, c) {
    if (state.circuitSolved) return; // locked after solving
    circuitRotations[r][c] = (circuitRotations[r][c] + 1) % 4;
    const tile = document.getElementById('ctile-'+r+'-'+c);
    if (tile) tile.innerHTML = tileSvg(CIRCUIT_LAYOUT[r][c], circuitRotations[r][c], false);
    if (isCircuitSolved()) {
      state.circuitSolved = true;
      // Re-render all tiles in powered state
      for (let rr = 0; rr < 3; rr++) {
        for (let cc = 0; cc < 3; cc++) {
          const t = document.getElementById('ctile-'+rr+'-'+cc);
          if (t) t.innerHTML = tileSvg(CIRCUIT_LAYOUT[rr][cc], circuitRotations[rr][cc], true);
        }
      }
      const st = document.getElementById('circuitStatus');
      if (st) { st.className = 'circuit-status on'; st.textContent = '⚡ 전원 연결됨! 사물함이 켜졌다.'; }
      document.getElementById('fuseStatus').setAttribute('fill', '#0F6E56');
      updateLockerDigitsInSVG();
      log('전기 패널의 회로가 연결되었다. 사물함 표시기에 불이 들어왔다.');
    }
  };

  // ====================== Lockers ======================
  window.onLockersClick = function() {
    if (state.circuitSolved) {
      log('사물함 문이 잠겨있다. 각 문에 한 자리 숫자가 또렷이 보인다. 누구의 것인지는 추리해야 한다.');
    } else {
      log('사물함 문이 잠겨있다. 표시기에 불이 들어와 있지 않아 숫자가 보이지 않는다. 전기가 끊긴 듯하다.');
    }
  };

  // ====================== Plant / Desk / Backpack ======================
  window.onPlantClick = function() {
    if (!state.plantChecked) {
      state.plantChecked = true; state.hasSmallKey = true; addItem('small_key');
      document.getElementById('plantGroup').style.display = 'none';
      document.getElementById('plantDugGroup').style.display = '';
      log('화분 흙을 헤집어보니, 작고 낡은 황동 열쇠가 묻혀있었다.');
    } else { log('화분 속에는 더 이상 아무것도 없다.'); }
  };
  function drawerNoteHTML() {
    return '<div class="note-paper"><strong>' + DRAWER_CLUE + '</strong>' +
           '<span class="note-instr">※ 비밀번호: 1번 자리부터 4번 자리까지, 각 자리의 사물함 숫자를 차례로 입력.</span></div>';
  }
  function backpackNoteHTML() { return '<div class="note-paper"><strong>' + BACKPACK_CLUE + '</strong></div>'; }
  window.onDeskClick = function() {
    if (state.drawerOpened) {
      showModal('<h3><i class="ti ti-notes" aria-hidden="true"></i>서랍 속 쪽지</h3>' + drawerNoteHTML() + '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>');
    } else if (state.hasSmallKey) {
      state.drawerOpened = true; addItem('note');
      showModal('<h3><i class="ti ti-notes" aria-hidden="true"></i>서랍이 열렸다</h3><p style="font-size:13px;color:var(--color-text-secondary);">작은 열쇠가 서랍에 딱 맞았다. 색이 바랜 쪽지가 있다.</p>' + drawerNoteHTML() + '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>');
    } else { log('선생님 책상이다. 서랍은 굳게 잠겨있다. 작은 열쇠가 있어야 열겠다.'); }
  };
  window.onBackpackClick = function() {
    if (!state.backpackChecked) {
      state.backpackChecked = true; addItem('bp_note');
      document.getElementById('backpackGroup').style.display = 'none';
      document.getElementById('backpackOpenGroup').style.display = '';
      showModal('<h3><i class="ti ti-school" aria-hidden="true"></i>가방 속 쪽지</h3><p style="font-size:13px;color:var(--color-text-secondary);">누군가 가방에 작은 쪽지를 남겨두었다.</p>' + backpackNoteHTML() + '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>');
    } else {
      showModal('<h3><i class="ti ti-school" aria-hidden="true"></i>가방 속 쪽지</h3>' + backpackNoteHTML() + '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>');
    }
  };

  // ====================== Painting / Safe / Door ======================
  window.onPaintingClick = function() {
    if (!state.paintingMoved) {
      state.paintingMoved = true;
      document.getElementById('paintingGroup').style.display = 'none';
      document.getElementById('safeGroup').style.display = '';
      log('액자가 살짝 비스듬했다. 옆으로 밀어내자, 벽 속에 숨겨진 금고가 모습을 드러냈다.');
    } else { window.onSafeClick(); }
  };
  window.onSafeClick = function() {
    if (state.safeOpened) { log('금고는 이미 텅 비어있다.'); return; }
    showModal(
      '<h3>금고 잠금장치</h3>' +
      '<p style="font-size:13px;color:var(--color-text-secondary);">4자리 비밀번호 — 1번 자리부터 4번 자리까지, 사물함 숫자를 차례로.</p>' +
      '<div class="code-row">' +
        '<input type="text" maxlength="1" class="code-digit" id="d1" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d2" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d3" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d4" inputmode="numeric">' +
      '</div>' +
      '<div class="code-msg" id="codeMsg"></div>' +
      '<div class="modal-actions"><button onclick="closeModal()">취소</button><button class="primary" onclick="trySafeCode()">확인</button></div>'
    );
    setTimeout(() => {
      const digits = ['d1','d2','d3','d4'].map(id => document.getElementById(id));
      digits.forEach((d, i) => {
        d.addEventListener('input', () => {
          d.value = d.value.replace(/[^0-9]/g,'');
          if (d.value && i < 3) digits[i+1].focus();
        });
        d.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !d.value && i > 0) digits[i-1].focus();
          if (e.key === 'Enter') window.trySafeCode();
        });
      });
      digits[0].focus();
    }, 40);
  };
  window.trySafeCode = function() {
    const code = ['d1','d2','d3','d4'].map(id => document.getElementById(id).value).join('');
    if (code === puzzle.code) {
      state.safeOpened = true; addItem('golden_key'); closeModal();
      log('철컥. 금고가 열렸다. 안에는 교실 출입문 열쇠가 들어있었다.');
      const sd = document.getElementById('safeDoor'); if (sd) sd.setAttribute('fill', '#1F4A2E');
    } else {
      state.wrongAttempts += 1;
      const a = state.wrongAttempts;
      let hint;
      if (a === 1)      hint = '비밀번호가 틀렸다.';
      else if (a === 2) hint = '딸칵... 잠금이 단단하다.';
      else if (a === 3) hint = '사물함에 전기가 들어와 있는가? 단서는 모두 모았는가?';
      else if (a === 4) hint = '7개 단서로 모든 자리의 색깔이 유일하게 정해진다.';
      else if (a === 5) hint = '1번 자리부터 차례로, 그 자리의 사물함 색에 적힌 숫자를 입력.';
      else              hint = '추리 메모표를 채우면서 다시. 칠판을 보자.';
      document.getElementById('codeMsg').textContent = hint;
      ['d1','d2','d3','d4'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('d1').focus();
    }
  };
  window.onDoorClick = function() {
    if (state.won) return;
    if (state.inv.includes('golden_key')) {
      state.won = true;
      const a = state.wrongAttempts;
      let rating;
      if (a === 0) rating = '단 한 번의 실수도 없이 완벽한 추리.';
      else if (a <= 2) rating = '약간의 시행착오 끝에.';
      else if (a <= 5) rating = '몇 번의 헛수고 끝에.';
      else rating = '꽤 많은 시도 끝에 마침내.';
      showModal('<div class="win-title">탈출 성공</div><p>열쇠가 자물쇠와 딸각 맞물렸다. 교실 문이 천천히 열리며, 복도의 불빛이 들이쳤다.</p><p style="color:var(--color-text-secondary);font-size:13px;">'+rating+' 회로를 잇고, 사물함의 주인들을 추리해내고, 학교 밖으로. (틀린 비밀번호 '+a+'회)</p><div class="modal-actions" style="margin-top:14px;"><button onclick="restart()">다시 도전</button></div>');
    } else { log('교실 문이 단단히 잠겨있다. 특별한 열쇠가 필요해 보인다.'); }
  };

  function onInvClick(item) {
    if (item === 'note') showModal('<h3><i class="ti ti-notes" aria-hidden="true"></i>서랍 쪽지</h3>' + drawerNoteHTML() + '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>');
    else if (item === 'bp_note') showModal('<h3><i class="ti ti-school" aria-hidden="true"></i>가방 쪽지</h3>' + backpackNoteHTML() + '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>');
    else if (item === 'small_key') log('작고 낡은 황동 열쇠다. 작은 자물쇠에 맞을 것 같다.');
    else if (item === 'golden_key') log('교실 출입문 열쇠다.');
  }

  window.restart = function() {
    puzzle = generatePuzzle();
    randomizeCircuit();
    state = { inv: [], hasSmallKey: false, plantChecked: false, drawerOpened: false, backpackChecked: false, circuitSolved: false, paintingMoved: false, safeOpened: false, wrongAttempts: 0, won: false };
    scratchPad = { pos1: { color: null, subject: null }, pos2: { color: null, subject: null }, pos3: { color: null, subject: null }, pos4: { color: null, subject: null } };
    document.getElementById('plantGroup').style.display = '';
    document.getElementById('plantDugGroup').style.display = 'none';
    document.getElementById('backpackGroup').style.display = '';
    document.getElementById('backpackOpenGroup').style.display = 'none';
    document.getElementById('paintingGroup').style.display = '';
    document.getElementById('safeGroup').style.display = 'none';
    document.getElementById('fuseStatus').setAttribute('fill', '#A32D2D');
    const sd = document.getElementById('safeDoor'); if (sd) sd.setAttribute('fill', '#2A2A2A');
    updateLockerDigitsInSVG();
    renderInventory();
    closeModal();
    log('방과 후, 텅 빈 교실에서 깨어났다. 사물함은 어둡고, 칠판에는 분필 자국이 보인다. 단서를 모으고 사물함에 전기를 통하게 해야 할 것 같다.');
  };

  document.getElementById('restartBtn').addEventListener('click', window.restart);
  document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });
  updateLockerDigitsInSVG();
})();
</script>
</body>
</html>
