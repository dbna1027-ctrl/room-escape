<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀의 서재 — 방탈출 (난이도 ↑↑↑)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    --font-mono: "SF Mono", "Menlo", Consolas, monospace;
    --font-serif: "Times New Roman", "Nanum Myeongjo", serif;
    --color-text-primary: #1A1A19;
    --color-text-secondary: #5F5E5A;
    --color-text-tertiary: #888780;
    --color-text-info: #185FA5;
    --color-text-danger: #A32D2D;
    --color-text-success: #0F6E56;
    --color-background-page: #F5F4EF;
    --color-background-primary: #FFFFFF;
    --color-background-secondary: #F1EFE8;
    --color-background-tertiary: #E5E2D8;
    --color-background-info: #E6F1FB;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --color-border-secondary: rgba(0,0,0,0.3);
    --color-border-info: #378ADD;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #ECEBE6;
      --color-text-secondary: #B4B2A9;
      --color-text-tertiary: #888780;
      --color-text-info: #85B7EB;
      --color-text-danger: #F09595;
      --color-text-success: #5DCAA5;
      --color-background-page: #1C1B18;
      --color-background-primary: #2A2A27;
      --color-background-secondary: #222220;
      --color-background-tertiary: #34332F;
      --color-background-info: #0C447C;
      --color-border-tertiary: rgba(255,255,255,0.15);
      --color-border-secondary: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    background: var(--color-background-page);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .wrap { width: 100%; max-width: 720px; }
  button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    background: transparent;
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  button:hover { background: var(--color-background-secondary); }
  button:active { transform: scale(0.98); }

  .escape-game { padding: 1rem 0; }
  .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
  .game-title { font-size: 18px; font-weight: 500; }
  .game-sub { font-size: 13px; color: var(--color-text-secondary); margin-left: 8px; }
  .room { position: relative; width: 100%; aspect-ratio: 17 / 9; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); background: #D9C9B0; }
  .room svg { display: block; width: 100%; height: 100%; transition: filter 0.5s ease; }
  .room.lamp-off svg { filter: brightness(0.45) saturate(0.55) hue-rotate(-8deg); }
  .hotspot { cursor: pointer; transition: filter 0.15s; }
  .hotspot:hover { filter: brightness(1.15); }
  .message-log { margin-top: 12px; padding: 14px 16px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); min-height: 58px; font-size: 14px; line-height: 1.6; }
  .inventory { margin-top: 12px; padding: 12px 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
  .inventory-title { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .inventory-items { display: flex; gap: 8px; flex-wrap: wrap; min-height: 32px; align-items: center; }
  .inv-item { padding: 6px 12px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .inv-item:hover { background: var(--color-background-tertiary); }
  .inv-empty { color: var(--color-text-tertiary); font-size: 13px; }
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 10; padding: 16px; overflow-y: auto; }
  .modal { background: var(--color-background-primary); padding: 20px 22px; border-radius: var(--border-radius-lg); max-width: 400px; width: 100%; border: 0.5px solid var(--color-border-tertiary); max-height: calc(100% - 8px); overflow-y: auto; }
  .modal h3 { margin: 0 0 4px; font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .modal .modal-state { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--color-background-secondary); }
  .modal .modal-state.dark { background: #1A1A19; color: #D4B43A; }
  .modal p { margin: 6px 0; font-size: 14px; line-height: 1.55; }
  .note-paper { margin: 12px 0; padding: 16px 18px; background: #F5EAC8; color: #3A2818; border: 0.5px solid #B89860; border-radius: var(--border-radius-md); font-family: var(--font-serif); font-size: 14px; line-height: 1.85; box-shadow: inset 0 0 12px rgba(120,80,30,0.08); }
  .note-paper .note-title { font-size: 13px; letter-spacing: 1px; text-align: center; border-bottom: 0.5px solid #B89860; padding-bottom: 8px; margin-bottom: 10px; font-style: normal; }
  .note-paper .note-order { font-family: var(--font-mono); font-size: 16px; letter-spacing: 3px; text-align: center; margin: 12px 0; color: #5A3010; font-weight: 500; }
  .note-paper .note-verse { font-style: italic; text-align: center; margin: 4px 0; }
  .note-paper .note-foot { font-size: 11px; color: #6A5535; margin-top: 14px; text-align: center; letter-spacing: 0.5px; }
  .books-grid-6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
  .book-card { padding: 10px 6px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); text-align: center; background: var(--color-background-secondary); position: relative; }
  .book-card .book-letter { position: absolute; top: 6px; right: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); font-weight: 500; }
  .book-swatch { width: 24px; height: 34px; margin: 0 auto 5px; border-radius: 2px; border: 0.5px solid rgba(0,0,0,0.2); }
  .book-label { font-size: 11px; color: var(--color-text-secondary); }
  .book-num { font-size: 17px; font-weight: 500; color: var(--color-text-primary); margin-top: 2px; font-family: var(--font-mono); letter-spacing: 1px; }
  .code-row { display: flex; gap: 8px; justify-content: center; margin: 14px 0 6px; }
  .code-digit { width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); font-family: inherit; }
  .code-digit:focus { outline: none; box-shadow: 0 0 0 2px var(--color-border-info); }
  .code-msg { font-size: 13px; text-align: center; min-height: 18px; color: var(--color-text-danger); margin-top: 4px; line-height: 1.4; }
  .modal-actions { display: flex; gap: 8px; margin-top: 10px; }
  .modal-actions button { flex: 1; }
  .modal-actions button.primary { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .win-title { font-size: 20px; font-weight: 500; color: var(--color-text-success); text-align: center; margin-bottom: 8px; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>

<h2 class="sr-only">한국어 방탈출 게임. 비밀의 서재에서 책장, 책상, 양탄자, 화분, 그림, 벽시계, 램프를 조사해 단서를 모으고, 어둠 속에서 진실을 발견해 4자리 금고 비밀번호를 풀고 황금 열쇠를 얻어 탈출하세요.</h2>

<script>
(function(){
  const COLORS_ORDER = ['red','orange','yellow','green','blue','purple'];
  const COLORS = {
    red:    { name: '빨간 책', letter: 'R', hex: '#C44545' },
    orange: { name: '주황 책', letter: 'O', hex: '#D4843A' },
    yellow: { name: '노란 책', letter: 'Y', hex: '#D4B43A' },
    green:  { name: '초록 책', letter: 'G', hex: '#4A7A3E' },
    blue:   { name: '파란 책', letter: 'B', hex: '#3B6BA8' },
    purple: { name: '보라 책', letter: 'P', hex: '#6B4A8B' }
  };
  const CODE_ORDER = ['yellow','red','green','blue']; // Y → R → G → B

  function rand3() { return Math.floor(100 + Math.random() * 900); }
  function randDigitPos() { return Math.floor(Math.random() * 3) + 1; } // 1, 2, or 3

  function generatePuzzle() {
    const lampOff = {};
    const lampOn = {};
    COLORS_ORDER.forEach(c => {
      lampOff[c] = rand3();
      let on;
      do { on = rand3(); } while (on === lampOff[c]);
      lampOn[c] = on;
    });
    const dp = randDigitPos();
    const code = CODE_ORDER.map(c => {
      return lampOff[c].toString()[dp - 1];
    }).join('');
    return { lampOff, lampOn, code, digitPosition: dp };
  }

  let puzzle = generatePuzzle();
  let state = {
    inv: [], hasSmallKey: false, plantChecked: false,
    drawerOpened: false, paintingMoved: false, safeOpened: false,
    lampOn: true, wrongAttempts: 0, won: false
  };

  const itemNames = {
    small_key:  { icon: 'ti-key',   name: '작은 열쇠' },
    note:       { icon: 'ti-notes', name: '메모' },
    golden_key: { icon: 'ti-key',   name: '황금 열쇠' }
  };

  const NOTE_HTML =
    '<div class="note-paper">' +
      '<div class="note-title">진실의 비밀번호 — 네 자리</div>' +
      '<div class="note-order">Y &rarr; R &rarr; G &rarr; B</div>' +
      '<div class="note-verse">각 책의 세 숫자 중,</div>' +
      '<div class="note-verse">오직 한 자리만이 진실이다.</div>' +
      '<div class="note-verse">멈춰버린 자가</div>' +
      '<div class="note-verse">그 자리를 알려준다.</div>' +
      '<div class="note-foot">* 빛 아래 보이는 숫자는 거짓이다.</div>' +
    '</div>';

  function log(msg) { document.getElementById('messageLog').textContent = msg; }

  function renderInventory() {
    const div = document.getElementById('inventoryItems');
    if (state.inv.length === 0) {
      div.innerHTML = '<span class="inv-empty">아직 가진 것이 없다</span>';
      return;
    }
    div.innerHTML = state.inv.map(i => {
      const it = itemNames[i];
      return '<span class="inv-item" data-id="'+i+'"><i class="ti '+it.icon+'" aria-hidden="true"></i>'+it.name+'</span>';
    }).join('');
    div.querySelectorAll('.inv-item').forEach(el => {
      el.addEventListener('click', () => onInvClick(el.dataset.id));
    });
  }

  function addItem(item) {
    if (!state.inv.includes(item)) {
      state.inv.push(item);
      renderInventory();
    }
  }

  function showModal(html) {
    document.getElementById('modalBox').innerHTML = html;
    document.getElementById('modalOverlay').style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }
  window.closeModal = closeModal;

  function updateClockHand(pos) {
    // pos is 1, 2, or 3 — angle from 12 (top), clockwise
    const angleDeg = pos * 30;
    const rad = angleDeg * Math.PI / 180;
    const cx = 455, cy = 105, len = 17;
    const x2 = cx + len * Math.sin(rad);
    const y2 = cy - len * Math.cos(rad);
    const hand = document.getElementById('clockHourHand');
    if (hand) {
      hand.setAttribute('x2', x2.toFixed(2));
      hand.setAttribute('y2', y2.toFixed(2));
    }
  }

  window.onRugClick = function() {
    log('양탄자를 들춰보니, 분필로 휘갈겨 쓴 글씨가 있다 — "램프가 꺼질 때, 책이 진실을 말한다."');
    document.getElementById('rugGroup').style.display = 'none';
    document.getElementById('rugFlippedGroup').style.display = '';
  };

  window.onPlantClick = function() {
    if (!state.plantChecked) {
      state.plantChecked = true;
      state.hasSmallKey = true;
      addItem('small_key');
      document.getElementById('plantGroup').style.display = 'none';
      document.getElementById('plantDugGroup').style.display = '';
      log('화분의 흙을 헤집어보니, 흙 속에 작고 낡은 황동 열쇠가 묻혀있었다.');
    } else {
      log('화분 속에는 더 이상 아무것도 없다.');
    }
  };

  window.onDeskClick = function() {
    if (state.drawerOpened) {
      showModal(
        '<h3><i class="ti ti-notes" aria-hidden="true"></i>서랍 속 메모</h3>' +
        NOTE_HTML +
        '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
      );
    } else if (state.hasSmallKey) {
      state.drawerOpened = true;
      addItem('note');
      showModal(
        '<h3><i class="ti ti-notes" aria-hidden="true"></i>서랍이 열렸다</h3>' +
        '<p style="font-size:13px;color:var(--color-text-secondary);">작은 열쇠가 서랍에 딱 맞았다. 색이 바랜 메모가 들어있다.</p>' +
        NOTE_HTML +
        '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
      );
    } else {
      log('튼튼한 책상이다. 서랍은 굳게 잠겨있고, 위에는 작은 램프가 놓여있다.');
    }
  };

  window.onLampClick = function() {
    state.lampOn = !state.lampOn;
    const room = document.getElementById('room');
    const bulb = document.getElementById('lampBulb');
    const glow = document.getElementById('lampGlow');
    if (state.lampOn) {
      room.classList.remove('lamp-off');
      bulb.setAttribute('fill', '#FFE680');
      bulb.setAttribute('stroke', '#D4B43A');
      glow.setAttribute('opacity', '0.45');
      log('램프 스위치를 딸각 — 방이 다시 따뜻한 빛으로 채워졌다.');
    } else {
      room.classList.add('lamp-off');
      bulb.setAttribute('fill', '#2A2A2A');
      bulb.setAttribute('stroke', '#1A1A1A');
      glow.setAttribute('opacity', '0');
      log('램프 스위치를 딸각 — 방이 어둠에 잠겼다. 무언가 달라 보이는 것 같다...');
    }
  };

  window.onClockClick = function() {
    const h = puzzle.digitPosition;
    log('벽시계가 ' + h + '시 정각에서 멈춰있다. 시간은 흐르지 않지만, 시침은 ' + h + '을 또렷이 가리키고 있다.');
  };

  window.onBookshelfClick = function() {
    const books = state.lampOn ? puzzle.lampOn : puzzle.lampOff;
    const stateLabel = state.lampOn
      ? '<span class="modal-state"><i class="ti ti-bulb" aria-hidden="true"></i>방이 밝다</span>'
      : '<span class="modal-state dark"><i class="ti ti-bulb-off" aria-hidden="true"></i>방이 어둡다</span>';
    let html =
      '<h3>맨 윗 칸의 책들</h3>' +
      stateLabel +
      '<p style="font-size:13px;color:var(--color-text-secondary);margin-top:10px;">각 책 표지에 세 자릿수가 새겨져 있다.</p>' +
      '<div class="books-grid-6">';
    COLORS_ORDER.forEach(c => {
      html +=
        '<div class="book-card">' +
          '<div class="book-letter">'+COLORS[c].letter+'</div>' +
          '<div class="book-swatch" style="background:'+COLORS[c].hex+'"></div>' +
          '<div class="book-label">'+COLORS[c].name+'</div>' +
          '<div class="book-num">'+books[c]+'</div>' +
        '</div>';
    });
    html += '</div><div class="modal-actions"><button onclick="closeModal()">닫기</button></div>';
    showModal(html);
  };

  window.onPaintingClick = function() {
    if (!state.paintingMoved) {
      state.paintingMoved = true;
      document.getElementById('paintingGroup').style.display = 'none';
      document.getElementById('safeGroup').style.display = '';
      log('그림이 살짝 비스듬했다. 옆으로 밀어내자, 벽 속에 숨겨진 금고가 모습을 드러냈다.');
    } else {
      window.onSafeClick();
    }
  };

  window.onSafeClick = function() {
    if (state.safeOpened) { log('금고는 이미 텅 비어있다.'); return; }
    showModal(
      '<h3>금고 잠금장치</h3>' +
      '<p style="font-size:13px;color:var(--color-text-secondary);">4자리 비밀번호를 입력하세요.</p>' +
      '<div class="code-row">' +
        '<input type="text" maxlength="1" class="code-digit" id="d1" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d2" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d3" inputmode="numeric">' +
        '<input type="text" maxlength="1" class="code-digit" id="d4" inputmode="numeric">' +
      '</div>' +
      '<div class="code-msg" id="codeMsg"></div>' +
      '<div class="modal-actions">' +
        '<button onclick="closeModal()">취소</button>' +
        '<button class="primary" onclick="trySafeCode()">확인</button>' +
      '</div>'
    );
    setTimeout(() => {
      const digits = ['d1','d2','d3','d4'].map(id => document.getElementById(id));
      digits.forEach((d, i) => {
        d.addEventListener('input', () => {
          d.value = d.value.replace(/[^0-9]/g,'');
          if (d.value && i < 3) digits[i+1].focus();
        });
        d.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !d.value && i > 0) digits[i-1].focus();
          if (e.key === 'Enter') window.trySafeCode();
        });
      });
      digits[0].focus();
    }, 40);
  };

  window.trySafeCode = function() {
    const code = ['d1','d2','d3','d4'].map(id => document.getElementById(id).value).join('');
    if (code === puzzle.code) {
      state.safeOpened = true;
      addItem('golden_key');
      closeModal();
      log('철컥. 금고가 열렸다. 안에는 빛나는 황금 열쇠가 들어있었다.');
      const safeDoor = document.getElementById('safeDoor');
      if (safeDoor) safeDoor.setAttribute('fill', '#1F4A2E');
    } else {
      state.wrongAttempts += 1;
      const msgEl = document.getElementById('codeMsg');
      let hint;
      const a = state.wrongAttempts;
      if (a === 1)      hint = '비밀번호가 틀렸다.';
      else if (a === 2) hint = '딸칵... 잠금이 단단하다.';
      else if (a === 3) hint = '메모를 다시 읽자. 한 글자도 허투루 쓰이지 않았다.';
      else if (a === 4) hint = 'Y, R, G, B... 알파벳이 가리키는 색은 무엇인가?';
      else if (a === 5) hint = '각 책에는 세 자리가 있지만, 단 한 자리만이 진실이다.';
      else if (a === 6) hint = '이 방 안에서 "멈춰버린 자"는 무엇인가?';
      else if (a === 7) hint = '시침이 가리키는 그 숫자가, 곧 답의 자리(첫째? 둘째? 셋째?)다.';
      else              hint = '그리고 모든 진실은 빛이 꺼졌을 때만 드러난다.';
      msgEl.textContent = hint;
      ['d1','d2','d3','d4'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('d1').focus();
    }
  };

  window.onDoorClick = function() {
    if (state.won) return;
    if (state.inv.includes('golden_key')) {
      state.won = true;
      const a = state.wrongAttempts;
      let rating;
      if (a === 0)      rating = '단 한 번의 실수도 없이 완벽하게.';
      else if (a <= 2)  rating = '약간의 시행착오 끝에.';
      else if (a <= 5)  rating = '몇 번의 헛수고 끝에.';
      else if (a <= 10) rating = '꽤 많은 시도 끝에 마침내.';
      else              rating = '수많은 시도 끝에 마침내.';
      showModal(
        '<div class="win-title">탈출 성공</div>' +
        '<p>황금 열쇠가 자물쇠와 딸각 맞물렸다. 문이 천천히 열리며, 햇살이 쏟아져 들어왔다.</p>' +
        '<p style="color:var(--color-text-secondary);font-size:13px;">'+rating+' 서재의 비밀을 풀고 자유를 되찾았다. (틀린 비밀번호 '+a+'회)</p>' +
        '<div class="modal-actions" style="margin-top:14px;"><button onclick="restart()">다시 도전</button></div>'
      );
    } else {
      log('문은 단단히 잠겨있다. 특별한 열쇠가 필요해 보인다.');
    }
  };

  function onInvClick(item) {
    if (item === 'note') {
      showModal(
        '<h3><i class="ti ti-notes" aria-hidden="true"></i>메모</h3>' +
        NOTE_HTML +
        '<div class="modal-actions"><button onclick="closeModal()">닫기</button></div>'
      );
    } else if (item === 'small_key') log('작고 낡은 황동 열쇠다. 작은 자물쇠에 맞을 것 같다.');
    else if (item === 'golden_key')  log('황금 열쇠가 손 안에서 묵직하게 빛난다. 분명 출구를 열어줄 것이다.');
  }

  window.restart = function() {
    puzzle = generatePuzzle();
    state = { inv: [], hasSmallKey: false, plantChecked: false, drawerOpened: false, paintingMoved: false, safeOpened: false, lampOn: true, wrongAttempts: 0, won: false };
    document.getElementById('rugGroup').style.display = '';
    document.getElementById('rugFlippedGroup').style.display = 'none';
    document.getElementById('plantGroup').style.display = '';
    document.getElementById('plantDugGroup').style.display = 'none';
    document.getElementById('paintingGroup').style.display = '';
    document.getElementById('safeGroup').style.display = 'none';
    document.getElementById('room').classList.remove('lamp-off');
    const bulb = document.getElementById('lampBulb');
    const glow = document.getElementById('lampGlow');
    bulb.setAttribute('fill', '#FFE680');
    bulb.setAttribute('stroke', '#D4B43A');
    glow.setAttribute('opacity', '0.45');
    const safeDoor = document.getElementById('safeDoor');
    if (safeDoor) safeDoor.setAttribute('fill', '#2A2A2A');
    updateClockHand(puzzle.digitPosition);
    renderInventory();
    closeModal();
    log('낯선 방에서 깨어났다. 어두운 서재에 비밀이 숨어있는 듯하다. 주변 물건을 클릭해 단서를 모아보자.');
  };

  document.getElementById('restartBtn').addEventListener('click', window.restart);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') closeModal();
  });

  // Initial clock setup
  updateClockHand(puzzle.digitPosition);
})();
</script>
</body>
</html>
